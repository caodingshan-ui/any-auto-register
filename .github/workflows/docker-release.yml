name: Build and Release Docker Image

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g., v1.0.0)'
        required: true
        type: string

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build \
            --build-arg CAMOUFOX_VERSION=135.0.1 \
            --build-arg CAMOUFOX_RELEASE=beta.24 \
            -t any-auto-register:${{ github.event.inputs.tag }} \
            .

      - name: Export Docker image to tar.gz
        run: |
          docker save any-auto-register:${{ github.event.inputs.tag }} | gzip > any-auto-register-${{ github.event.inputs.tag }}.tar.gz

      - name: Create Draft Release and upload artifact
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event.inputs.tag }}
          draft: true
          files: any-auto-register-${{ github.event.inputs.tag }}.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
